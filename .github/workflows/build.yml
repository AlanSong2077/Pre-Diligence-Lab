name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同一分支并发运行只保留最新一个
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. 基础 lint + 语法（所有平台通用）────────────────────
  lint:
    name: lint (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps (skip GUI)
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas yfinance akshare beautifulsoup4 lxml matplotlib keyring pyyaml
          # PyQt6 在 headless 环境装不上，这里只做语法 / import 校验
          pip install PyQt6 --only-binary=:all: || echo "PyQt6 跳过（headless）"

      - name: py_compile all .py
        run: |
          set -e
          for f in $(find . -maxdepth 2 -name "*.py" -not -path "./.venv/*"); do
            python -m py_compile "$f"
          done

      - name: Validate workflow YAMLs
        run: |
          python -c "
          import yaml, glob, sys
          for p in glob.glob('.github/workflows/*.yml'):
              with open(p) as f:
                  yaml.safe_load(f)
              print('  OK:', p)
          "

      - name: Validate PyInstaller spec (syntax only)
        run: |
          python -c "
          import ast
          with open('PreDiligenceLab.spec') as f:
              ast.parse(f.read())
          print('  spec syntax OK')
          "

  # ── 2. Windows 烟囱测试（只 verify spec 可被 PyInstaller 解析）──
  windows:
    name: build (windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: PyInstaller availability + spec syntax check
        # PyInstaller 在传入 .spec 文件时直接进入 build 模式，所有 makespec 类
        # 选项（--name / --specpath / --collect-submodules / --hidden-import）
        # 都会被拒绝（"makespec options not valid when a .spec file is given"）。
        # 因此这里改用 ast 校验 + PyInstaller 模块 import 检测，与 macOS
        # 任务的 smoke 风格保持一致；正式产物的构建在 release.yml 中完成。
        run: |
          python -c "import ast; ast.parse(open('PreDiligenceLab.spec').read()); print('  spec syntax OK on Windows')"
          python -c "import PyInstaller; print(f'  PyInstaller {PyInstaller.__version__} importable on Windows')"
          python -c "from PyInstaller.utils.hooks import collect_submodules; mods = collect_submodules('PyQt6'); print(f'  PyQt6 submodules: {len(mods)}')"

  # ── 3. macOS 烟囱测试 ─────────────────────────────────
  macos:
    name: build (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PyInstaller
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller --break-system-packages

      - name: Verify spec file parses on macOS Python
        run: |
          python3 -c "
          import ast
          with open('PreDiligenceLab.spec') as f:
              ast.parse(f.read())
          print('  spec syntax OK on macOS')
          "

      - name: List PyInstaller hidden imports referenced by spec
        run: |
          python3 -c "
          from PyInstaller.utils.hooks import collect_submodules
          mods = collect_submodules('PyQt6')
          print(f'  PyQt6 submodules: {len(mods)}')
          "
